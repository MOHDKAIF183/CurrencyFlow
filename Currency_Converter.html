<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4e4ba;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            min-height: 45vh;
            width: 40vh;
        }

        form {
            margin: 2rem 0 1rem 0;
        }

        form select,
        button,
        input {
            width: 100%;
            border: none;
            outline: none;
            border-radius: 0.75rem;

        }

        form input {
            border: 1px solid lightgray;
            font-size: 1rem;
            height: 3rem;
            padding-left: 0.5rem;

        }

        .dropdown {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;

        }

        .dropdown i {
            font-size: 1.5rem;
            margin-top: 1rem;

        }

        .select-container img {
            max-width: 2rem;

        }

        .select-container {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0.5rem;
            border: 1px solid lightgray;
            width: 6rem;

        }

        .select-container select {
            font-size: 1rem;
            width: auto;
        }

        .msg {
            margin: 2rem 0 2rem 0;

        }

        form button {
            height: 3rem;
            background-color: #af4d98;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form>
            <div class="amount">
                <p>Enter Amount :</p>
                <input value="100" type="text">
            </div>
            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/shiny/64.png">
                        <select name="from">
                        </select>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png">
                        <select name="To">
                        </select>
                    </div>
                </div>
            </div>
            <div class="msg">
                1USD = 95INR
            </div>
            <button>Get Exchange Rate</button>
        </form>
    </div>

    <script src="codes.js"></script>
    <script>const dropdowns = document.querySelectorAll(".dropdown select");
        const btn = document.querySelector("form button");
        const fromCurr = document.querySelector(".from select");
        const toCurr = document.querySelector(".to select");
        const msg = document.querySelector(".msg");

        // Fill dropdowns
        for (let select of dropdowns) {
            for (let currCode in countryList) {
                let option = document.createElement("option");
                option.value = currCode;
                option.innerText = currCode;

                if (select.name === "from" && currCode === "USD") {
                    option.selected = true;
                } else if (select.name === "To" && currCode === "INR") {
                    option.selected = true;
                }

                select.append(option);
            }

            select.addEventListener("change", (evt) => {
                updateFlag(evt.target);
            });
        }

        // Update flag
        function updateFlag(element) {
            let countryCode = countryList[element.value];
            let img = element.parentElement.querySelector("img");
            img.src = `https://flagsapi.com/${countryCode}/flat/64.png`;
        }

        // Exchange Rate
        btn.addEventListener("click", async (evt) => {
            evt.preventDefault();

            let amount = document.querySelector(".amount input");
            let amtVal = Number(amount.value);

            if (amtVal < 1) {
                amtVal = 1;
                amount.value = 1;
            }

            const from = fromCurr.value;
            const to = toCurr.value;

            const URL = `https://open.er-api.com/v6/latest/${from}`;

            let response = await fetch(URL);
            let data = await response.json();

            let rate = data.rates[to];
            let finalAmount = (amtVal * rate).toFixed(2);

            msg.innerText = `${amtVal} ${from} = ${finalAmount} ${to}`;
        });

        // Default conversion on page load
        window.addEventListener("load", () => {
            btn.click();
        });</script>
</body>

</html>
